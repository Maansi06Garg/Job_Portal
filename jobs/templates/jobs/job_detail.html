<h2>{{ job.title }}</h2>

<p>
Description: {{ job.description }}
</p>

<p>
Location: {{ job.location }}
</p>

<p>
Salary: {{ job.salary }}
</p>

<p>
Experience Required: {{ job.experience_required }}
</p>
<hr>

{% if user.is_authenticated %}

    {% if user.user_type == 'jobseeker' %}

        <a href="{% url 'apply_job' job.id %}">
            Apply Now
        </a>

    {% endif %}

{% endif %}
