{% extends "base.html" %}

{% block title %}Job Seeker Signup{% endblock %}

{% block content %}
<div class="card shadow-sm">
  <div class="card-body">
    <h2 class="h4 mb-3">Job Seeker Signup</h2>
    <form method="post" novalidate>
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-success mt-3">Signup</button>
    </form>
  </div>
</div>
{% endblock %}
